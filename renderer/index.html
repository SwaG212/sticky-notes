<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便利贴</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <div class="pages-container">
    <!-- 主页面（任务管理） -->
    <div class="page page-main">
      <!-- 任务清单区 -->
      <div id="task-list">
        <div id="task-empty" class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">还没有任务</div>
          <div class="empty-desc">在下方输入想做的事，然后点击「整理」</div>
        </div>
        <div id="task-items"></div>
      </div>

      <!-- 分隔线 -->
      <div class="divider"></div>

      <!-- 输入区 -->
      <div id="input-area">
        <div id="image-previews"></div>
        <textarea id="text-input" placeholder="记录想做的事..." rows="4"></textarea>
        <div id="input-actions">
          <span class="daily-report-group">
            <button id="btn-daily-report">日报</button>
            <span id="daily-report-hint" class="daily-report-hint"></span>
          </span>
          <span class="input-buttons">
            <button id="btn-organize" disabled>整理 ▸</button>
            <button id="btn-switch-notepad">→</button>
          </span>
        </div>
      </div>
    </div>

    <!-- 记事本页面 -->
    <div class="page page-notepad">
      <button id="btn-settings" title="设置">⚙</button>
      <div class="notepad-toolbar">
        <button id="btn-note-list">☰</button>
        <button id="btn-note-new">+</button>
      </div>
      <textarea id="notepad-textarea" placeholder="记录笔记..."></textarea>
      <div class="notepad-footer">
        <button id="btn-notepad-back">←</button>
      </div>
      <div id="note-list-overlay" class="hidden">
        <div id="note-list-search-box">
          <input type="text" id="note-list-search" placeholder="搜索文件名...">
        </div>
        <div id="note-list-items"></div>
      </div>
    </div>
  </div>

  <!-- 设置页面遮罩 -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-dialog">
      <div class="settings-header">
        <button id="btn-settings-back">← 返回</button>
        <span class="settings-title">设置</span>
        <button id="btn-settings-confirm">确认</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-section-title">API 配置</div>
          <label>API Key</label>
          <input type="password" id="settings-apikey" placeholder="sk-xxxxxxxxxxxxxxxxxxxx">
          <label>API 地址（可选，默认 DeepSeek）</label>
          <input type="text" id="settings-baseurl" placeholder="https://api.deepseek.com">
          <label>日报姓名</label>
          <input type="text" id="settings-reportname" placeholder="输入姓名，用于日报">
          <label>文件读取位置（留空使用默认路径）</label>
          <input type="text" id="settings-notesdir" placeholder="如 D:\我的笔记，留空则使用默认">
        </div>
        <div class="settings-section">
          <div class="settings-section-title">快捷键设置</div>
          <div class="shortcut-row">
            <span class="shortcut-label">唤出/隐藏</span>
            <input type="text" class="shortcut-input" id="shortcut-toggle" readonly placeholder="点击设置快捷键">
          </div>
          <div class="shortcut-row">
            <span class="shortcut-label">整理</span>
            <input type="text" class="shortcut-input" id="shortcut-organize" readonly placeholder="点击设置快捷键">
          </div>
          <div class="shortcut-row">
            <span class="shortcut-label">切换任务页面</span>
            <input type="text" class="shortcut-input" id="shortcut-switchTask" readonly placeholder="点击设置快捷键">
          </div>
          <div class="shortcut-row">
            <span class="shortcut-label">切换笔记页面</span>
            <input type="text" class="shortcut-input" id="shortcut-switchNotepad" readonly placeholder="点击设置快捷键">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 整理中提示 -->
  <div id="processing-overlay" class="hidden">
    <div class="spinner"></div>
    <div id="processing-text">AI 整理中...</div>
  </div>
</div>

<script src="renderer.js"></script>
</body>
</html>
