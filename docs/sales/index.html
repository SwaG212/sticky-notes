<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便利贴 · Windows AI 桌面效率工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#0f0f0f;color:#e0e0e0;display:flex;align-items:center;justify-content:center}
.card{width:360px;background:linear-gradient(160deg,#12122a 0%,#1a1040 60%,#0f1a30 100%);border-radius:16px;padding:36px 28px 28px;text-align:center;border:1px solid #222;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,215,0,0.12),transparent 70%);border-radius:50%}
.card::after{content:'';position:absolute;bottom:-40px;left:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,107,107,0.08),transparent 70%);border-radius:50%}
.badge{display:inline-block;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#ffd700;font-size:0.7em;padding:3px 10px;border-radius:20px;letter-spacing:2px;margin-bottom:16px;position:relative;z-index:1}
h1{font-size:2.8em;font-weight:900;letter-spacing:4px;margin-bottom:6px;position:relative;z-index:1;background:linear-gradient(180deg,#fff 20%,#ffd700 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:#888;font-size:0.85em;margin-bottom:22px;position:relative;z-index:1;line-height:1.5}
.features-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:22px;position:relative;z-index:1}
.feat{color:#aaa;font-size:0.75em;background:rgba(255,255,255,0.04);padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
.price-box{margin-bottom:10px;position:relative;z-index:1}
.price{font-size:3.2em;font-weight:900;color:#ffd700;line-height:1}
.price-unit{font-size:0.4em;color:#ffd700;vertical-align:super}
.price-sub{display:block;font-size:0.5em;color:#888;margin-top:2px}
.buy-badge{display:inline-block;background:#ff6b6b;color:#fff;font-size:0.7em;padding:2px 10px;border-radius:3px;margin-bottom:18px;position:relative;z-index:1;animation:fadeInOut 2s infinite}
@keyframes fadeInOut{0%,100%{opacity:1}50%{opacity:0.5}}
.guarantee{display:flex;justify-content:center;gap:16px;margin-bottom:18px;position:relative;z-index:1}
.g-item{color:#666;font-size:0.7em}
.links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative;z-index:1}
.links a{color:#ffd700;text-decoration:none;font-size:0.78em;padding:6px 16px;border:1px solid rgba(255,215,0,0.3);border-radius:6px;transition:all .2s}
.links a:hover{background:rgba(255,215,0,0.1);border-color:#ffd700}
.links a.main-link{background:#ffd700;color:#000;border-color:#ffd700;font-weight:bold}
.qr-hint{color:#555;font-size:0.7em;margin-top:16px;position:relative;z-index:1}
</style>
</head>
<body>

<div class="card">
  <div class="badge">WINDOWS 桌面应用</div>
  <h1>便利贴</h1>
  <p class="tagline">打字 · 贴截图 · 一键 AI 变任务清单<br>定时提醒 · 勾选执行 · 一键日报</p>

  <div class="features-row">
    <span class="feat">AI 整理</span>
    <span class="feat">OCR 识图</span>
    <span class="feat">定时提醒</span>
    <span class="feat">记事本</span>
    <span class="feat">|</span>
    <span class="feat">只存本地</span>
  </div>

  <div class="price-box">
    <div class="price"><span class="price-unit">¥</span>2<span class="price-unit">.9</span></div>
    <span class="price-sub">买断 · 非订阅 · 永不到期</span>
  </div>
  <div class="buy-badge">闲鱼搜「便利贴AI」直接拍</div>

  <div class="guarantee">
    <span class="g-item">7 天包退</span>
    <span class="g-item">终身更新</span>
    <span class="g-item">包教包会</span>
  </div>

  <div class="links">
    <a href="https://github.com/SwaG212/sticky-notes/releases">免费下载</a>
    <a href="使用手册.html">怎么用</a>
    <a href="配置指南.html">怎么配</a>
  </div>

  <p class="qr-hint">需自备 DeepSeek API Key（免费注册，1 分钟搞定）</p>
</div>

</body>
</html>
